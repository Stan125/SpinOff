<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d0f">
  <title>SpinOff · Running</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="prep-screen" class="screen hidden">
  <div class="app-shell">
    <div class="top-bar">
      <button class="icon-btn" onclick="goHome()">←</button>
      <div class="class-title-sm" id="prep-title">Loading…</div>
      <div style="width:44px"></div>
    </div>
    <div class="section-label">Tracks</div>
    <div id="prep-track-list" class="prep-list">
      <div class="loading-state">Reading class file…</div>
    </div>
    <button class="btn-primary" id="start-btn" onclick="startClass()" disabled
            style="width:100%;margin-top:20px">Downloading…</button>
  </div>
</div>

<div id="runner-screen" class="screen hidden">
  <div class="app-shell">

    <div class="top-bar">
      <button class="icon-btn" onclick="goHome()">←</button>
      <div class="class-title-sm" id="class-title">Loading…</div>
      <div class="class-elapsed" id="class-elapsed">0:00</div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="class-progress"></div></div>

    <div class="song-card" id="song-card">
      <div class="song-label">
        <span id="track-label">Track 1</span>
        <span id="track-type-tag" class="type-tag">—</span>
      </div>
      <div class="song-name" id="song-name">—</div>
      <div class="song-artist" id="song-artist">—</div>
      <div class="song-meta">
        <span class="meta-pill" id="meta-bpm">—</span>
        <span class="meta-pill" id="meta-rpe">—</span>
        <span class="meta-pill" id="meta-res">—</span>
      </div>
    </div>

    <div class="intensity-row">
      <span class="intensity-label">Resistance</span>
      <div class="intensity-bars" id="intensity-bars"></div>
      <span class="intensity-val" id="intensity-val">—</span>
    </div>

    <div class="cue-box" id="cue-box">
      <div class="cue-label" id="cue-label">Cue</div>
      <div class="cue-text" id="cue-text">Get ready…</div>
      <div class="cue-dots" id="cue-dots"></div>
    </div>

    <div class="next-card">
      <span class="next-label">Up next</span>
      <div class="next-info">
        <div class="next-song" id="next-song">—</div>
        <div class="next-type" id="next-type">—</div>
      </div>
    </div>

    <audio id="audio-player" preload="auto"></audio>

    <div class="controls">
      <button class="ctrl-btn" onclick="prevTrack()">⏮</button>
      <button class="ctrl-btn primary" id="play-btn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn" onclick="nextTrack()">⏭</button>
    </div>

    <div class="track-progress-row">
      <span class="track-time" id="track-current">0:00</span>
      <div class="track-progress-bar" id="track-bar" onclick="seekTrack(event)">
        <div class="track-progress-fill" id="track-fill"></div>
      </div>
      <span class="track-time" id="track-duration">0:00</span>
    </div>

  </div>
</div>

<script src="app.js"></script>
<script>
  window.addEventListener('load', () => {
    const token = localStorage.getItem('dbx_token');
    if (!token) { window.location.href = 'index.html'; return; }
    const classFolder = sessionStorage.getItem('current_class');
    if (!classFolder) { window.location.href = 'index.html'; return; }
    initRunner(classFolder);
  });
</script>
</body>
</html>
