<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f4f1ec">
  <title>SpinOff · Running</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="prep-screen" class="screen hidden">
  <div class="app-shell">
    <div class="top-bar">
      <button class="icon-btn" onclick="goHome()">←</button>
      <div class="class-title-sm" id="prep-title">Loading…</div>
      <div style="width:44px"></div>
    </div>
    <div class="section-label">Tracks</div>
    <div id="prep-track-list" class="prep-list">
      <div class="loading-state">Reading class file…</div>
    </div>
    <button class="btn-primary" id="start-btn" onclick="startClass()" disabled
            style="width:100%;margin-top:20px">Downloading…</button>
    <button id="clear-cache-btn" onclick="clearClassCache()"
            style="width:100%;margin-top:10px;padding:10px;background:none;border:none;color:#999;font-size:13px;cursor:pointer">
      Clear downloaded audio &amp; re-download
    </button>
  </div>
</div>

<div id="runner-screen" class="screen hidden">
  <div class="app-shell">

    <div class="top-bar">
      <button class="icon-btn" onclick="goHome()">←</button>
      <div class="class-title-sm" id="class-title">Loading…</div>
      <div class="class-elapsed" id="class-elapsed">0:00</div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="class-progress"></div></div>

    <div id="class-overview" class="class-overview"></div>

    <div class="song-card" id="song-card">
      <div id="song-zone-strip" class="song-zone-strip"></div>
      <div class="song-label">
        <span id="track-label">Track 1</span>
        <span id="track-type-tag" class="type-tag">—</span>
      </div>
      <div class="song-name" id="song-name">—</div>
      <div class="song-artist" id="song-artist">—</div>
      <div class="song-meta">
        <span class="meta-pill" id="meta-bpm">—</span>
        <span class="meta-pill" id="meta-rpe">—</span>
      </div>
    </div>

    <div class="cue-box" id="cue-box">
      <div class="cue-now-label">Now</div>
      <div class="cue-text" id="cue-text">Get ready…</div>
      <div class="cue-sep"></div>
      <div class="cue-label" id="cue-label">Next cue in</div>
      <div class="cue-next-text" id="cue-next-text">—</div>
      <div class="cue-dots" id="cue-dots"></div>
      <button class="cue-list-btn" onclick="showCueList()">All remaining cues ›</button>
    </div>

    <div id="cue-list-modal" class="cue-list-modal hidden" onclick="hideCueList()">
      <div class="cue-list-sheet" onclick="event.stopPropagation()">
        <div class="cue-list-header">
          <span>Remaining Cues</span>
          <button class="cue-list-close" onclick="hideCueList()">✕</button>
        </div>
        <div id="cue-list-body" class="cue-list-body"></div>
      </div>
    </div>

    <div class="next-card" id="next-card">
      <div class="next-left">
        <span class="next-label">Up next</span>
        <div class="next-song" id="next-song">—</div>
        <div class="next-type" id="next-type">—</div>
      </div>
      <div class="next-duration" id="next-duration"></div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" onclick="prevTrack()">PREV</button>
      <button class="ctrl-btn primary" id="play-btn" onclick="togglePlay()">PLAY</button>
      <button class="ctrl-btn" onclick="nextTrack()">NEXT</button>
    </div>

    <div class="track-progress-row">
      <span class="track-time" id="track-current">0:00</span>
      <div class="track-progress-bar" id="track-bar" onclick="seekTrack(event)">
        <div class="track-progress-fill" id="track-fill"></div>
      </div>
      <span class="track-time" id="track-remaining">-0:00</span>
    </div>

  </div>
</div>

<script src="app.js"></script>
<script>
  window.addEventListener('load', () => {
    const token = localStorage.getItem('dbx_token');
    if (!token) { window.location.href = 'index.html'; return; }
    const classFolder = sessionStorage.getItem('current_class');
    if (!classFolder) { window.location.href = 'index.html'; return; }
    initRunner(classFolder);
  });
</script>
</body>
</html>
