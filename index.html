<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SpinOff">
  <meta name="theme-color" content="#f4f1ec">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.png">
  <title>SpinOff</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="auth-screen" class="screen">
  <div class="auth-center">
    <div class="logo">SpinOff</div>
    <div class="logo-sub">your AI spin coach</div>
    <button class="btn-primary" onclick="startDropboxAuth()">Connect Dropbox</button>
    <a href="demo.html" class="demo-link">Try demo (no login needed)</a>
    <div class="install-hint" id="install-hint" style="display:none">
      Tip: tap Share → "Add to Home Screen" for fullscreen mode
    </div>
  </div>
</div>

<div id="home-screen" class="screen hidden">
  <div class="app-shell">
    <div class="top-bar">
      <div class="logo-sm">SpinOff</div>
      <button class="icon-btn" onclick="logout()" title="Disconnect">⏏</button>
    </div>
    <div class="section-label">Your Classes</div>
    <div id="class-list" class="class-list">
      <div class="loading-state">Loading classes…</div>
    </div>
    <button onclick="forceUpdate()"
            style="width:100%;margin-top:16px;padding:10px;background:none;border:none;color:#999;font-size:13px;cursor:pointer">
      ↻ Reload latest version
    </button>
  </div>
</div>

<script src="app.js"></script>
<script>
  window.addEventListener('load', () => {
    const token = localStorage.getItem('dbx_token');
    if (token) {
      showScreen('home-screen');
      loadClasses();
    } else {
      showScreen('auth-screen');
      const isStandalone = window.navigator.standalone;
      if (!isStandalone) {
        document.getElementById('install-hint').style.display = 'block';
      }
    }
  });
</script>
</body>
</html>
